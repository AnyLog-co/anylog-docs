title: AnyLog Docs
description: Technical documentation for AnyLog Edge Data Fabric
baseurl: ""
url: "https://anylog-docs.github.io"

# Build
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections
collections:
  docs:
    output: true
    permalink: /docs/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: docs
    values:
      layout: page

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

# ── Sidebar navigation ──────────────────────────────────
# Add/reorder entries here as new docs are created.
# Each `slug` must match the filename in _docs/ (without .md)
nav:
  - title: Getting Started
    items:
      - slug: getting-started
        title: Overview
  - title: Data Ingestion
    items:
      - slug: data-ingestion-overview
        title: How data is collected
      - slug: msg-client
        title: run msg client
  - title: Querying Data
    items:
      - slug: querying-overview
        title: Querying overview
